<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corporate Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;800&display=swap');

*{font-family:Vazirmatn,sans-serif; transition:.3s;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#070b14;
}

/* THEME BUTTON */
.theme-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    background:#2200ff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    cursor:pointer;
}

/* CARD */
.login-card{
    width:950px;
    border-radius:26px;
    overflow:hidden;
    background:#ff0000;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
}

/* LEFT */
.left{
    background:linear-gradient(135deg,#0d6efd,#000000);
    color:#ffffff;
    padding:70px;
    position:relative;
}

.left::after{
    content:"";
    position:absolute;
    width:300px;height:300px;
    background:rgba(255, 255, 255, 0.06);
    border-radius:50%;
    top:-120px;right:-120px;
}

.logo{
    width:70px;height:70px;
    border-radius:18px;
    background:#fff;
    color:#000000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    margin-bottom:25px;
}

/* RIGHT */
.right{
    padding:60px;
    background:#000000;
}

.form-control{
    height:52px;
    background:#ffffff;
    border:none;
    color:#ffffff;
}

.form-control:focus{
    background:#ffffff;
    color:#000000;
    box-shadow:0 0 0 2px #0d6efd55;
}

.badge-secure{
    background:#0b1220;
    color:#ffffff;
    border:1px solid #3300ff33;
    padding:8px 16px;
    border-radius:30px;
    display:inline-block;
    margin-bottom:25px;
}

/* LIGHT MODE */
.light{
    background:#eef2f7;
}

.light .login-card{
    background:#fff;
}

.light .right{
    background:#2d2dd5;
    color:#000;
}

.light .form-control{
    background:#f1f3f6;
    color:#000000;
}

.light .left{
    background:linear-gradient(135deg,#000000,#ffffff);
}

.light .badge-secure{
    background:#f3f4f6;
    color:#111;
}

</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">
    <i id="icon" class="bi bi-moon-fill"></i>
</button>

<div class="login-card">
<div class="row g-0">

<!-- LEFT -->
<div class="col-lg-6 left">
    <div class="logo"><i class="bi bi-buildings-fill"></i></div>
    <h2 class="fw-bold">Corporate Group</h2>
    <p class="opacity-75">سیستم مدیریت سازمانی سطح بالا</p>
</div>

<!-- RIGHT -->
<div class="col-lg-6 right">

<span class="badge-secure">
<i class="bi bi-shield-lock-fill"></i> Secure Login
</span>

<h3 class="fw-bold mb-4">ورود به پنل</h3>

<form>
    <div class="mb-3">
        <label class ="form-label">شماره تماس</label>
        <input class="form-control" type="شماره" placeholder="0912345678">
    </div>

    <div class="mb-4">
        <label class="form-label">پسورد</label>
        <input class="form-control" type="text" placeholder="پسورد">
    </div>

    <button class="btn btn-primary w-100" style="height:52px;">
        ورود به سیستم
    </button>
</form>

</div>
</div>
</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("light");

    const icon = document.getElementById("icon");

    if(document.body.classList.contains("light")){
        icon.classList.remove("bi-moon-fill");
        icon.classList.add("bi-sun-fill");
        localStorage.setItem("theme","light");
    }else{
        icon.classList.remove("bi-sun-fill");
        icon.classList.add("bi-moon-fill");
        localStorage.setItem("theme","dark");
    }
}

window.onload = () => {
    if(localStorage.getItem("theme")==="light"){
        document.body.classList.add("light");
        document.getElementById("icon").classList.replace("bi-moon-fill","bi-sun-fill");
    }
}
</script>

</body>
</html>
